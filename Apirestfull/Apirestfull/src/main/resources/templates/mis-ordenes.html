<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Pedidos - E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛍️ E-Commerce</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/productos" class="nav-link">Productos</a></li>
                <li class="nav-item"><a href="/carrito" class="nav-link">🛒 Carrito <span id="contadorCarrito" class="badge bg-success">0</span></a></li>
                <li class="nav-item"><a href="/mis-ordenes" class="nav-link active">Mis Pedidos</a></li>
                <li class="nav-item"><a href="/perfil" class="nav-link">Mi Perfil</a></li>
                <li class="nav-item"><a href="/logout" class="btn btn-outline-danger ms-2">Cerrar Sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">Mis Pedidos</h1>
        <a href="/productos" class="btn btn-primary">Seguir Comprando</a>
    </div>
    
    <div id="loadingOrders" class="text-center py-4">
        <div class="spinner-border" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-2">Cargando pedidos...</p>
    </div>
    
    <div id="ordersContainer" style="display: none;">
        <!-- Las órdenes se cargarán aquí -->
    </div>
    
    <div id="noOrders" class="text-center py-5" style="display: none;">
        <div class="mb-3">
            📦
        </div>
        <h4>No tienes pedidos aún</h4>
        <p class="text-muted">Cuando realices tu primera compra, aparecerá aquí.</p>
        <a href="/productos" class="btn btn-primary">Explorar Productos</a>
    </div>
</main>

<!-- Modal para ver detalles del pedido -->
<div class="modal fade" id="modalDetalleOrden" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Detalles del Pedido</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBodyDetalle">
                <!-- Detalles se cargarán aquí -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    cargarOrdenes();
    actualizarContadorCarrito();
});

async function cargarOrdenes() {
    try {
        // TODO: Obtener el ID del usuario logueado dinámicamente
        const usuarioId = 1; 
        
        const response = await fetch(`/api/ordenes/usuario/${usuarioId}`);
        
        if (response.ok) {
            const ordenes = await response.json();
            mostrarOrdenes(ordenes);
        } else {
            mostrarError('Error al cargar los pedidos');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarError('Error de conexión');
    }
    
    document.getElementById('loadingOrders').style.display = 'none';
}

function mostrarOrdenes(ordenes) {
    const container = document.getElementById('ordersContainer');
    const noOrders = document.getElementById('noOrders');
    
    if (ordenes.length === 0) {
        noOrders.style.display = 'block';
        return;
    }
    
    container.innerHTML = ordenes.map(orden => {
        const fecha = new Date(orden.fecha).toLocaleDateString('es-ES', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        
        const estadoClass = getEstadoClass(orden.estado);
        
        return `
            <div class="card mb-3">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-2">
                            <small class="text-muted">Pedido</small>
                            <div class="fw-bold">#${orden.id}</div>
                        </div>
                        <div class="col-md-3">
                            <small class="text-muted">Fecha</small>
                            <div>${fecha}</div>
                        </div>
                        <div class="col-md-2">
                            <small class="text-muted">Total</small>
                            <div class="fw-bold text-success">$${(orden.total || 0).toFixed(2)}</div>
                        </div>
                        <div class="col-md-2">
                            <small class="text-muted">Estado</small>
                            <div>
                                <span class="badge ${estadoClass}">${orden.estado}</span>
                            </div>
                        </div>
                        <div class="col-md-3 text-end">
                            <button class="btn btn-outline-primary btn-sm" onclick="verDetalleOrden(${orden.id})">
                                Ver Detalles
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
    
    container.style.display = 'block';
}

function getEstadoClass(estado) {
    switch (estado) {
        case 'PENDIENTE': return 'bg-warning';
        case 'PROCESANDO': return 'bg-info';
        case 'ENVIADO': return 'bg-primary';
        case 'ENTREGADO': return 'bg-success';
        case 'CANCELADO': return 'bg-danger';
        default: return 'bg-secondary';
    }
}

async function verDetalleOrden(ordenId) {
    try {
        const response = await fetch(`/api/ordenes/${ordenId}`);
        
        if (response.ok) {
            const orden = await response.json();
            mostrarDetalleOrden(orden);
            
            const modal = new bootstrap.Modal(document.getElementById('modalDetalleOrden'));
            modal.show();
        } else {
            alert('Error al cargar los detalles del pedido');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error de conexión');
    }
}

async function mostrarDetalleOrden(orden) {
    const modalBody = document.getElementById('modalBodyDetalle');
    
    // Cargar información del producto
    let producto = null;
    try {
        const response = await fetch(`/api/productos/${orden.productoId}`);
        if (response.ok) {
            producto = await response.json();
        }
    } catch (error) {
        console.error('Error loading product:', error);
    }
    
    const fecha = new Date(orden.fecha).toLocaleDateString('es-ES', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
    
    modalBody.innerHTML = `
        <div class="row">
            <div class="col-md-6">
                <h6>Información del Pedido</h6>
                <table class="table table-sm">
                    <tr>
                        <td><strong>Número de Pedido:</strong></td>
                        <td>#${orden.id}</td>
                    </tr>
                    <tr>
                        <td><strong>Fecha:</strong></td>
                        <td>${fecha}</td>
                    </tr>
                    <tr>
                        <td><strong>Estado:</strong></td>
                        <td><span class="badge ${getEstadoClass(orden.estado)}">${orden.estado}</span></td>
                    </tr>
                    <tr>
                        <td><strong>Total:</strong></td>
                        <td class="text-success fw-bold">$${(orden.total || 0).toFixed(2)}</td>
                    </tr>
                </table>
            </div>
            <div class="col-md-6">
                <h6>Producto</h6>
                <div class="d-flex align-items-center">
                    <img src="${producto ? (producto.imagen || 'https://via.placeholder.com/60') : 'https://via.placeholder.com/60'}" 
                         alt="Producto" class="me-3" style="width: 60px; height: 60px; object-fit: cover;">
                    <div>
                        <div class="fw-bold">${producto ? producto.nombre : 'Producto no encontrado'}</div>
                        <div class="text-muted">Cantidad: ${orden.cantidad}</div>
                        <div class="text-muted">Precio unitario: $${producto ? producto.precio.toFixed(2) : '0.00'}</div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function mostrarError(mensaje) {
    const container = document.getElementById('ordersContainer');
    container.innerHTML = `
        <div class="alert alert-danger" role="alert">
            ${mensaje}
        </div>
    `;
    container.style.display = 'block';
}

function actualizarContadorCarrito() {
    const carrito = JSON.parse(localStorage.getItem('carrito') || '[]');
    const total = carrito.reduce((sum, item) => sum + item.cantidad, 0);
    document.getElementById('contadorCarrito').textContent = total;
}
</script>
</body>
</html>
