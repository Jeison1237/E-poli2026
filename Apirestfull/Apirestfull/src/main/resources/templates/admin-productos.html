<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🛍️ E-Commerce Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/productos" class="nav-link">Ver Tienda</a></li>
                <li class="nav-item"><a href="/logout" class="btn btn-outline-danger ms-2">Cerrar Sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="d-flex">
    <nav class="sidebar bg-dark text-white" style="min-width:250px; min-height:100vh; padding:20px">
        <h5>Panel Admin</h5>
        <ul class="nav flex-column">
            <li class="nav-item mb-2">
                <a href="/admin" class="nav-link text-white">
                    📊 Dashboard
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/productos" class="nav-link text-white active">
                    📦 Productos
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/ordenes" class="nav-link text-white">
                    📋 Órdenes
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/usuarios" class="nav-link text-white">
                    👥 Usuarios
                </a>
            </li>
            <li class="nav-item mb-2">
                <a href="/admin/reportes" class="nav-link text-white">
                    📈 Reportes
                </a>
            </li>
            <li class="nav-item mt-4">
                <a href="/logout" class="nav-link text-danger">
                    🚪 Salir
                </a>
            </li>
        </ul>
    </nav>
    
    <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 mb-0">Gestión de Productos</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProducto">
                + Nuevo Producto
            </button>
        </div>
        
        <!-- Filtros -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="text" id="buscarNombre" class="form-control" placeholder="Buscar por nombre...">
                    </div>
                    <div class="col-md-3">
                        <select id="filtroCategoria" class="form-select">
                            <option value="">Todas las categorías</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filtroStock" class="form-select">
                            <option value="">Todo el stock</option>
                            <option value="bajo">Stock bajo (<10)</option>
                            <option value="sin">Sin stock</option>
                            <option value="disponible">Disponible</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">
                            Limpiar
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Tabla de productos -->
        <div class="card">
            <div class="card-body">
                <div id="loadingProductos" class="text-center py-4">
                    <div class="spinner-border" role="status"></div>
                    <p class="mt-2">Cargando productos...</p>
                </div>
                
                <div id="tablaProductos" style="display: none;">
                    <!-- La tabla se llenará con JavaScript -->
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal para crear/editar producto -->
<div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Nuevo Producto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formProducto">
                    <input type="hidden" id="productoId">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" id="categoria" class="form-control">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea id="descripcion" class="form-control" rows="3"></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Precio *</label>
                            <input type="number" id="precio" class="form-control" step="0.01" min="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Stock *</label>
                            <input type="number" id="stock" class="form-control" min="0" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">URL Imagen</label>
                            <input type="url" id="imagen" class="form-control">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Vista previa de imagen</label>
                        <div id="previsualizacionImagen" class="text-center">
                            <img id="imagenPreview" src="https://via.placeholder.com/200x150?text=Sin+Imagen" 
                                 alt="Preview" class="img-thumbnail" style="max-height: 150px;">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" form="formProducto" class="btn btn-primary">
                    Guardar Producto
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let productos = [];
let productoEditando = null;

document.addEventListener('DOMContentLoaded', function() {
    cargarProductos();
    configurarEventos();
});

function configurarEventos() {
    // Filtros
    document.getElementById('buscarNombre').addEventListener('input', aplicarFiltros);
    document.getElementById('filtroCategoria').addEventListener('change', aplicarFiltros);
    document.getElementById('filtroStock').addEventListener('change', aplicarFiltros);
    
    // Form producto
    document.getElementById('formProducto').addEventListener('submit', guardarProducto);
    document.getElementById('imagen').addEventListener('input', actualizarPreviewImagen);
    
    // Modal events
    document.getElementById('modalProducto').addEventListener('hidden.bs.modal', limpiarFormulario);
}

async function cargarProductos() {
    try {
        const response = await fetch('/api/productos');
        if (response.ok) {
            productos = await response.json();
            mostrarProductos(productos);
            cargarCategorias();
        } else {
            mostrarError('Error al cargar productos');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarError('Error de conexión');
    } finally {
        document.getElementById('loadingProductos').style.display = 'none';
        document.getElementById('tablaProductos').style.display = 'block';
    }
}

function mostrarProductos(listaProductos) {
    const container = document.getElementById('tablaProductos');
    
    if (listaProductos.length === 0) {
        container.innerHTML = '<p class="text-center text-muted py-4">No hay productos para mostrar</p>';
        return;
    }
    
    const tabla = `
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    ${listaProductos.map(producto => {
                        const stock = producto.stock || producto.cantidad || 0;
                        let estadoClass = 'success';
                        let estadoTexto = 'Disponible';
                        
                        if (stock === 0) {
                            estadoClass = 'danger';
                            estadoTexto = 'Sin stock';
                        } else if (stock < 10) {
                            estadoClass = 'warning';
                            estadoTexto = 'Stock bajo';
                        }
                        
                        return `
                            <tr>
                                <td>${producto.id}</td>
                                <td>
                                    <img src="${producto.imagen || 'https://via.placeholder.com/50'}" 
                                         alt="${producto.nombre}" 
                                         style="width: 50px; height: 50px; object-fit: cover;"
                                         class="rounded">
                                </td>
                                <td>
                                    <div class="fw-bold">${producto.nombre}</div>
                                    <small class="text-muted">${producto.descripcion || 'Sin descripción'}</small>
                                </td>
                                <td>${producto.categoria || 'Sin categoría'}</td>
                                <td class="fw-bold text-success">$${producto.precio.toFixed(2)}</td>
                                <td>${stock}</td>
                                <td>
                                    <span class="badge bg-${estadoClass}">${estadoTexto}</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <button class="btn btn-outline-primary" onclick="editarProducto(${producto.id})">
                                            Editar
                                        </button>
                                        <button class="btn btn-outline-danger" onclick="eliminarProducto(${producto.id})">
                                            Eliminar
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
        </div>
    `;
    
    container.innerHTML = tabla;
}

function cargarCategorias() {
    const categorias = [...new Set(productos.map(p => p.categoria).filter(Boolean))];
    const select = document.getElementById('filtroCategoria');
    
    select.innerHTML = '<option value="">Todas las categorías</option>' +
        categorias.map(cat => `<option value="${cat}">${cat}</option>`).join('');
}

function aplicarFiltros() {
    const nombre = document.getElementById('buscarNombre').value.toLowerCase();
    const categoria = document.getElementById('filtroCategoria').value;
    const stock = document.getElementById('filtroStock').value;
    
    let productosFiltrados = productos.filter(producto => {
        // Filtro por nombre
        if (nombre && !producto.nombre.toLowerCase().includes(nombre)) {
            return false;
        }
        
        // Filtro por categoría
        if (categoria && producto.categoria !== categoria) {
            return false;
        }
        
        // Filtro por stock
        if (stock) {
            const stockProducto = producto.stock || producto.cantidad || 0;
            switch (stock) {
                case 'bajo':
                    if (stockProducto >= 10) return false;
                    break;
                case 'sin':
                    if (stockProducto > 0) return false;
                    break;
                case 'disponible':
                    if (stockProducto === 0) return false;
                    break;
            }
        }
        
        return true;
    });
    
    mostrarProductos(productosFiltrados);
}

function limpiarFiltros() {
    document.getElementById('buscarNombre').value = '';
    document.getElementById('filtroCategoria').value = '';
    document.getElementById('filtroStock').value = '';
    mostrarProductos(productos);
}

function nuevoProducto() {
    productoEditando = null;
    document.getElementById('modalTitle').textContent = 'Nuevo Producto';
    limpiarFormulario();
    new bootstrap.Modal(document.getElementById('modalProducto')).show();
}

function editarProducto(id) {
    productoEditando = productos.find(p => p.id === id);
    if (!productoEditando) return;
    
    document.getElementById('modalTitle').textContent = 'Editar Producto';
    document.getElementById('productoId').value = productoEditando.id;
    document.getElementById('nombre').value = productoEditando.nombre;
    document.getElementById('categoria').value = productoEditando.categoria || '';
    document.getElementById('descripcion').value = productoEditando.descripcion || '';
    document.getElementById('precio').value = productoEditando.precio;
    document.getElementById('stock').value = productoEditando.stock || productoEditando.cantidad || 0;
    document.getElementById('imagen').value = productoEditando.imagen || '';
    
    actualizarPreviewImagen();
    
    new bootstrap.Modal(document.getElementById('modalProducto')).show();
}

async function guardarProducto(event) {
    event.preventDefault();
    
    const producto = {
        nombre: document.getElementById('nombre').value,
        categoria: document.getElementById('categoria').value,
        descripcion: document.getElementById('descripcion').value,
        precio: parseFloat(document.getElementById('precio').value),
        stock: parseInt(document.getElementById('stock').value),
        imagen: document.getElementById('imagen').value
    };
    
    try {
        let response;
        if (productoEditando) {
            response = await fetch(`/api/productos/${productoEditando.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(producto)
            });
        } else {
            response = await fetch('/api/productos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(producto)
            });
        }
        
        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
            await cargarProductos();
            mostrarNotificacion('Producto guardado exitosamente', 'success');
        } else {
            mostrarNotificacion('Error al guardar producto', 'danger');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarNotificacion('Error de conexión', 'danger');
    }
}

async function eliminarProducto(id) {
    if (!confirm('¿Estás seguro de que deseas eliminar este producto?')) {
        return;
    }
    
    try {
        const response = await fetch(`/api/productos/${id}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            await cargarProductos();
            mostrarNotificacion('Producto eliminado exitosamente', 'success');
        } else {
            mostrarNotificacion('Error al eliminar producto', 'danger');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarNotificacion('Error de conexión', 'danger');
    }
}

function actualizarPreviewImagen() {
    const url = document.getElementById('imagen').value;
    const preview = document.getElementById('imagenPreview');
    
    if (url) {
        preview.src = url;
        preview.onerror = function() {
            this.src = 'https://via.placeholder.com/200x150?text=Imagen+No+Válida';
        };
    } else {
        preview.src = 'https://via.placeholder.com/200x150?text=Sin+Imagen';
    }
}

function limpiarFormulario() {
    document.getElementById('formProducto').reset();
    document.getElementById('productoId').value = '';
    actualizarPreviewImagen();
}

function mostrarError(mensaje) {
    document.getElementById('tablaProductos').innerHTML = 
        `<div class="alert alert-danger text-center">${mensaje}</div>`;
}

function mostrarNotificacion(mensaje, tipo) {
    // Simple notification - you could use a toast library here
    const alertClass = tipo === 'success' ? 'alert-success' : 'alert-danger';
    const alerta = document.createElement('div');
    alerta.className = `alert ${alertClass} alert-dismissible fade show position-fixed`;
    alerta.style.cssText = 'top: 20px; right: 20px; z-index: 9999;';
    alerta.innerHTML = `
        ${mensaje}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    
    document.body.appendChild(alerta);
    
    setTimeout(() => {
        if (alerta.parentNode) {
            alerta.parentNode.removeChild(alerta);
        }
    }, 5000);
}
</script>
</body>
</html>
