<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/productos">ApiRestFull</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="/carrito" class="nav-link">
                        🛒 Carrito <span id="contadorCarrito" class="badge bg-success">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/logout" class="btn btn-outline-danger ms-3">Cerrar Sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">Gestión de Productos</h1>
        <span class="badge badge-soft">CRUD + Carrito</span>
    </div>

    <!-- Formulario para agregar producto -->
    <div class="card shadow p-4 mb-4">
        <h2 class="h5">Nuevo producto</h2>
        <div class="row g-2 mt-1">
            <div class="col-md-4">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Precio</label>
                <input type="number" id="precio" class="form-control" placeholder="Precio" step="0.01" min="0" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Cantidad</label>
                <input type="number" id="cantidad" class="form-control" placeholder="Cantidad" step="1" min="0" value="0" required>
            </div>
            <div class="col-md-2 d-grid align-items-end">
                <button class="btn btn-primary" onclick="crearProducto()">Agregar</button>
            </div>
        </div>
    </div>

    <!-- Tabla de productos -->
    <div class="card shadow p-3">
        <div class="d-flex align-items-center justify-content-between">
            <h2 class="h5 mb-0">Lista de Productos</h2>
            <button class="btn btn-outline-secondary btn-sm" onclick="cargarProductos()">Actualizar</button>
        </div>
        <div class="table-responsive mt-3">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody id="tablaProductos"></tbody>
            </table>
        </div>
        <div id="estadoVacio" class="empty-state d-none">
            <p class="mb-0">No hay productos aún. ¡Crea el primero arriba!</p>
        </div>
    </div>
</main>

<!-- Modal edición producto -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" id="editNombre" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" class="form-control" id="editPrecio" step="0.01" min="0" required>
        </div>
        <div class="mb-0">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" id="editCantidad" step="1" min="0" required>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container">
  <div id="appToast" class="toast align-items-center text-bg-info border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div id="toastMsg" class="toast-body"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "/api/productos";
    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
    let editModal;

    function showToast(msg, type='info'){
        const t = document.getElementById('appToast');
        const body = document.getElementById('toastMsg');
        ['text-bg-success','text-bg-danger','text-bg-info','text-bg-warning'].forEach(c=>t.classList.remove(c));
        t.classList.add('text-bg-' + type);
        body.textContent = msg;
        new bootstrap.Toast(t, { delay: 2500 }).show();
    }

    function guardarCarrito() { localStorage.setItem("carrito", JSON.stringify(carrito)); }
    function actualizarContadorCarrito() {
        const total = carrito.reduce((acc, item) => acc + item.cantidad, 0);
        const badge = document.getElementById("contadorCarrito");
        if (badge) badge.innerText = total;
    }

    async function cargarProductos() {
        const resp = await fetch(API_URL);
        if (!resp.ok) { showToast('Error al cargar productos','danger'); return; }
        const data = await resp.json();
        let filas = "";
        data.forEach(p => {
            const nombreEsc = (p.nombre || '').replaceAll('"', '\\"');
            const stock = p.cantidad ?? 0;
            const disabled = stock <= 0 ? 'disabled title="Sin stock"' : '';
            filas += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.nombre}</td>
                    <td class="price">${Number(p.precio).toFixed(2)}</td>
                    <td>${stock}</td>
                    <td>
                        <div class="btn-group btn-group-sm" role="group">
                          <button class="btn btn-success" ${disabled}
                            onclick="agregarAlCarrito(${p.id}, '${nombreEsc}', ${p.precio}, ${stock})">Añadir</button>
                          <button class="btn btn-warning" onclick="abrirEdicion(${p.id}, '${nombreEsc}', ${p.precio}, ${stock})">Editar</button>
                          <button class="btn btn-danger" onclick="eliminarProducto(${p.id})">Eliminar</button>
                        </div>
                    </td>
                </tr>`;
        });
        document.getElementById("tablaProductos").innerHTML = filas;
        document.getElementById("estadoVacio").classList.toggle('d-none', data.length !== 0);
    }

    async function crearProducto() {
        const nombre = document.getElementById("nombre").value.trim();
        const precio = parseFloat(document.getElementById("precio").value);
        const cantidad = parseInt(document.getElementById("cantidad").value, 10);
        if (!nombre || isNaN(precio) || isNaN(cantidad) || cantidad < 0) { showToast('Datos inválidos','warning'); return; }
        const resp = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ nombre, precio, cantidad }) });
        if (!resp.ok) { showToast('No se pudo crear','danger'); return; }
        document.getElementById("nombre").value = "";
        document.getElementById("precio").value = "";
        document.getElementById("cantidad").value = "0";
        showToast('Producto creado','success');
        cargarProductos();
    }

    async function eliminarProducto(id) {
        const ok = confirm('¿Eliminar producto #' + id + '?');
        if (!ok) return;
        const resp = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
        if (!resp.ok) { showToast('No se pudo eliminar','danger'); return; }
        showToast('Producto eliminado','success');
        cargarProductos();
    }

    function abrirEdicion(id, nombre, precio, cantidad){
        document.getElementById('editId').value = id;
        document.getElementById('editNombre').value = nombre;
        document.getElementById('editPrecio').value = precio;
        document.getElementById('editCantidad').value = cantidad ?? 0;
        editModal = editModal || new bootstrap.Modal(document.getElementById('editModal'));
        editModal.show();
    }

    async function guardarEdicion(){
        const id = document.getElementById('editId').value;
        const nombre = document.getElementById('editNombre').value.trim();
        const precio = parseFloat(document.getElementById('editPrecio').value);
        const cantidad = parseInt(document.getElementById('editCantidad').value, 10);
        if (!id || !nombre || isNaN(precio) || isNaN(cantidad) || cantidad < 0) { showToast('Datos inválidos','warning'); return; }
        const resp = await fetch(`${API_URL}/${id}`, { method: 'PUT', headers: { 'Content-Type':'application/json' }, body: JSON.stringify({ nombre, precio, cantidad }) });
        if (!resp.ok){ showToast('No se pudo actualizar','danger'); return; }
        showToast('Producto actualizado','success');
        editModal.hide();
        cargarProductos();
    }

    function agregarAlCarrito(id, nombre, precio, stockDisponible) {
        const item = carrito.find(i => i.id === id);
        const enCarrito = item ? item.cantidad : 0;
        if (enCarrito + 1 > (stockDisponible ?? 0)) { showToast('Sin más stock','warning'); return; }
        if (item) { item.cantidad++; item.stock = stockDisponible; }
        else { carrito.push({ id, nombre, precio, cantidad: 1, stock: stockDisponible }); }
        guardarCarrito();
        actualizarContadorCarrito();
        showToast('Añadido al carrito','success');
    }

    // Inicialización
    cargarProductos();
    actualizarContadorCarrito();
</script>
</body>
</html>
