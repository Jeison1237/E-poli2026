<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🛍️ E-Commerce</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a href="/productos" class="nav-link">Productos</a></li>
                <li class="nav-item"><a href="/carrito" class="nav-link">🛒 Carrito <span id="contadorCarrito" class="badge bg-success">0</span></a></li>
                <li class="nav-item"><a href="/mis-ordenes" class="nav-link">Mis Pedidos</a></li>
                <li class="nav-item"><a href="/perfil" class="nav-link">Mi Perfil</a></li>
                <li class="nav-item"><a href="/logout" class="btn btn-outline-danger ms-2">Cerrar Sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <img id="productoImagen" src="https://via.placeholder.com/500x300?text=Producto" class="card-img-top" alt="Imagen del producto">
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4">
                <h1 id="productoNombre" class="h3">Cargando...</h1>
                <p class="text-muted" id="productoCategoria">Categoría</p>
                <p id="productoDescripcion" class="mt-3">Cargando descripción...</p>
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <h3 id="productoPrecio" class="text-success">$0.00</h3>
                    <span id="productoStock" class="badge bg-secondary">Stock: 0</span>
                </div>
                <div class="row mt-4">
                    <div class="col-4">
                        <label class="form-label">Cantidad</label>
                        <input type="number" id="cantidad" class="form-control" value="1" min="1">
                    </div>
                    <div class="col-8 d-flex align-items-end">
                        <button id="btnAgregarCarrito" class="btn btn-primary w-100" onclick="agregarAlCarrito()">
                            Agregar al Carrito
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-4">
        <a href="/productos" class="btn btn-outline-secondary">← Volver a Productos</a>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let producto = null;

document.addEventListener('DOMContentLoaded', function() {
    const pathParts = window.location.pathname.split('/');
    const productoId = pathParts[pathParts.length - 1];
    
    cargarProducto(productoId);
    actualizarContadorCarrito();
});

async function cargarProducto(id) {
    try {
        const response = await fetch(`/api/productos/${id}`);
        if (response.ok) {
            producto = await response.json();
            mostrarProducto(producto);
        } else {
            mostrarError('Producto no encontrado');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarError('Error al cargar el producto');
    }
}

function mostrarProducto(p) {
    document.getElementById('productoNombre').textContent = p.nombre;
    document.getElementById('productoDescripcion').textContent = p.descripcion || 'Sin descripción disponible';
    document.getElementById('productoCategoria').textContent = p.categoria || 'Sin categoría';
    document.getElementById('productoPrecio').textContent = `$${p.precio.toFixed(2)}`;
    document.getElementById('productoStock').textContent = `Stock: ${p.stock || p.cantidad || 0}`;
    
    if (p.imagen) {
        document.getElementById('productoImagen').src = p.imagen;
    }
    
    // Disable button if no stock
    const stock = p.stock || p.cantidad || 0;
    const btnAgregar = document.getElementById('btnAgregarCarrito');
    const inputCantidad = document.getElementById('cantidad');
    
    if (stock <= 0) {
        btnAgregar.disabled = true;
        btnAgregar.textContent = 'Sin Stock';
        inputCantidad.disabled = true;
    } else {
        inputCantidad.max = stock;
    }
}

function mostrarError(mensaje) {
    document.getElementById('productoNombre').textContent = 'Error';
    document.getElementById('productoDescripcion').textContent = mensaje;
    document.getElementById('btnAgregarCarrito').disabled = true;
}

function agregarAlCarrito() {
    if (!producto) return;
    
    const cantidad = parseInt(document.getElementById('cantidad').value);
    if (cantidad <= 0) {
        alert('La cantidad debe ser mayor a 0');
        return;
    }
    
    const stock = producto.stock || producto.cantidad || 0;
    if (cantidad > stock) {
        alert(`No hay suficiente stock. Disponible: ${stock}`);
        return;
    }
    
    let carrito = JSON.parse(localStorage.getItem('carrito') || '[]');
    
    const itemExistente = carrito.find(item => item.id === producto.id);
    if (itemExistente) {
        if (itemExistente.cantidad + cantidad > stock) {
            alert(`No puedes agregar más. Ya tienes ${itemExistente.cantidad} en el carrito. Stock disponible: ${stock}`);
            return;
        }
        itemExistente.cantidad += cantidad;
    } else {
        carrito.push({
            id: producto.id,
            nombre: producto.nombre,
            precio: producto.precio,
            cantidad: cantidad,
            imagen: producto.imagen
        });
    }
    
    localStorage.setItem('carrito', JSON.stringify(carrito));
    actualizarContadorCarrito();
    
    // Show success message
    const btn = document.getElementById('btnAgregarCarrito');
    const originalText = btn.textContent;
    btn.textContent = '¡Agregado!';
    btn.classList.add('btn-success');
    btn.classList.remove('btn-primary');
    
    setTimeout(() => {
        btn.textContent = originalText;
        btn.classList.add('btn-primary');
        btn.classList.remove('btn-success');
    }, 2000);
}

function actualizarContadorCarrito() {
    const carrito = JSON.parse(localStorage.getItem('carrito') || '[]');
    const total = carrito.reduce((sum, item) => sum + item.cantidad, 0);
    document.getElementById('contadorCarrito').textContent = total;
}
</script>
</body>
</html>
